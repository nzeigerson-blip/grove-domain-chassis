# Grove Platform — Local Development Infrastructure
# Provides Kafka (KRaft mode), Valkey, PostgreSQL, and Kafka UI
# for local development and integration testing.
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose down           # Stop all services
#   docker compose down -v        # Stop and remove volumes (fresh start)
#
# Ports:
#   Kafka broker:    localhost:9092
#   Valkey cache:    localhost:6379
#   PostgreSQL:      localhost:5432
#   Kafka UI:        localhost:8090

services:
  # ─── Apache Kafka (KRaft mode — no Zookeeper) ───
  kafka:
    image: apache/kafka:3.7.0
    container_name: grove-kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Topic defaults
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      # Retention
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      # Performance
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # Cluster ID (fixed for reproducible local dev)
      CLUSTER_ID: "grove-local-dev-cluster-001"
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── Valkey 7.2 (Apache 2.0 — NOT Redis Ltd) ───
  valkey:
    image: valkey/valkey:7.2-alpine
    container_name: grove-valkey
    ports:
      - "6379:6379"
    command: >
      valkey-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── PostgreSQL 16 ───
  postgres:
    image: postgres:16-alpine
    container_name: grove-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: grove
      POSTGRES_PASSWORD: grove
      POSTGRES_DB: grove_sample
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grove"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Kafka UI (development tool — topic management & message inspection) ───
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: grove-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: grove-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  kafka-data:
  valkey-data:
  postgres-data:
