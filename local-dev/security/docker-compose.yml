# =============================================================================
# Grove Platform — Security Stack Local Development
# KAN-15: Vault + Keycloak + PostgreSQL (for Keycloak)
# =============================================================================
# Usage: docker compose up -d
# Ports:
#   Vault UI:    http://localhost:8200  (token: grove-dev-root-token)
#   Keycloak:    http://localhost:8180  (admin / admin)
#   KC Postgres: localhost:5433        (keycloak / keycloak)
# =============================================================================

services:
  # --- Vault (Dev Mode) ---
  vault:
    image: hashicorp/vault:1.17.3
    container_name: grove-vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "grove-dev-root-token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_LOG_LEVEL: "info"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - vault-data:/vault/data
      - ./vault-init.sh:/vault-init.sh:ro
    networks:
      - grove-security

  # --- Vault Initialization (runs once after Vault starts) ---
  vault-init:
    image: hashicorp/vault:1.17.3
    container_name: grove-vault-init
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "grove-dev-root-token"
    entrypoint: ["/bin/sh", "/vault-init.sh"]
    volumes:
      - ./vault-init.sh:/vault-init.sh:ro
    networks:
      - grove-security
    restart: "no"

  # --- PostgreSQL for Keycloak ---
  keycloak-db:
    image: postgres:16-alpine
    container_name: grove-keycloak-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - grove-security

  # --- Keycloak ---
  keycloak:
    image: quay.io/keycloak/keycloak:25.0.6
    container_name: grove-keycloak
    depends_on:
      keycloak-db:
        condition: service_healthy
    ports:
      - "8180:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://keycloak-db:5432/keycloak"
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_FEATURES: "token-exchange,admin-fine-grained-authz"
      KC_LOG_LEVEL: INFO
    command:
      - start-dev
      - --import-realm
    volumes:
      - ./grove-realm-dev.json:/opt/keycloak/data/import/grove-realm-dev.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - grove-security

volumes:
  vault-data:
  keycloak-db-data:

networks:
  grove-security:
    name: grove-security
    driver: bridge
