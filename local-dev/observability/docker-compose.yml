# Grove Platform — Local Observability Stack
# Adds OpenTelemetry Collector, Prometheus, Grafana, and Loki
# to the existing local-dev infrastructure.
#
# Usage:
#   docker compose -f ../grove-domain-chassis/local-dev/docker-compose.yml \
#                  -f docker-compose.yml up -d
#
# Ports:
#   OTEL gRPC:       localhost:4317
#   OTEL HTTP:       localhost:4318
#   Prometheus:      localhost:9090
#   Grafana:         localhost:3000 (admin/admin)
#   Loki:            localhost:3100

services:
  # ─── OpenTelemetry Collector ───
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: grove-otel-collector
    command: ["--config=/etc/otel/otel-collector-config.yaml"]
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus exporter
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/otel-collector-config.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Prometheus ───
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: grove-prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert-rules.yml:/etc/prometheus/rules/alert-rules.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Grafana ───
  grafana:
    image: grafana/grafana-oss:10.4.1
    container_name: grove-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./grafana-dashboard-providers.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ../observability-stack/base/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Loki (log aggregation) ───
  loki:
    image: grafana/loki:2.9.6
    container_name: grove-loki
    ports:
      - "3100:3100"
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
