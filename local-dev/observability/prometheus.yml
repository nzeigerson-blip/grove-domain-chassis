global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # OTel Collector forwarded metrics
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  # Spring Boot Actuator direct scrape (local dev)
  - job_name: grove-domains
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          app: grove-sample

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
