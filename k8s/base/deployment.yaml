apiVersion: apps/v1
kind: Deployment
metadata:
  name: grove-domain
  namespace: grove
  labels:
    app: grove-domain
    app.kubernetes.io/part-of: grove-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grove-domain
  template:
    metadata:
      labels:
        app: grove-domain
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: grove-domain
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: app
          image: grove-domain
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: grove-domain-config
                  key: SPRING_PROFILES_ACTIVE
            - name: GROVE_DOMAIN_NAME
              valueFrom:
                configMapKeyRef:
                  name: grove-domain-config
                  key: GROVE_DOMAIN_NAME
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: grove-domain-db
                  key: host
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: grove-domain-db
                  key: database
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: grove-domain-db
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grove-domain-db
                  key: password
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: grove-domain-kafka
                  key: bootstrap-servers
            - name: OAUTH_ISSUER_URI
              valueFrom:
                configMapKeyRef:
                  name: grove-domain-config
                  key: OAUTH_ISSUER_URI
            - name: OAUTH_JWK_SET_URI
              valueFrom:
                configMapKeyRef:
                  name: grove-domain-config
                  key: OAUTH_JWK_SET_URI
            - name: OTEL_EXPORTER_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: grove-domain-config
                  key: OTEL_EXPORTER_ENDPOINT
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
      terminationGracePeriodSeconds: 30
