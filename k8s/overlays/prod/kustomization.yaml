apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: grove

commonLabels:
  environment: prod

resources:
  - ../../base

patches:
  # PROD: high resources, 3 replicas, anti-affinity
  - target:
      kind: Deployment
      name: grove-domain
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 1Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 2000m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 2Gi
      - op: add
        path: /spec/template/spec/affinity
        value:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchExpressions:
                      - key: app
                        operator: In
                        values:
                          - grove-domain
                  topologyKey: topology.kubernetes.io/zone

  # PROD: HPA scales 3-10
  - target:
      kind: HorizontalPodAutoscaler
      name: grove-domain
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 10

  # PROD: PDB requires at least 2 available
  - target:
      kind: PodDisruptionBudget
      name: grove-domain
    patch: |
      - op: replace
        path: /spec/minAvailable
        value: 2

configMapGenerator:
  - name: grove-domain-config
    behavior: merge
    literals:
      - SPRING_PROFILES_ACTIVE=prod
      - OAUTH_ISSUER_URI=https://auth.grove.io/realms/grove
      - OAUTH_JWK_SET_URI=https://auth.grove.io/realms/grove/protocol/openid-connect/certs
